<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/global.css" />
    <title>Magazine</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <!-- ===== SECCIÓN 1: 3 TARJETAS SUPERIORES ===== -->
      <section class="section-top">
        <article class="card card--overlay">
          <div class="card__img-wrap">
            <img
              src="assets/images/pietro-de-grandi.jpg"
              alt="The Most Popular Places to Visit in the World"
            />
          </div>
          <div class="card__overlay">
            <span class="badge badge--lifestyle">Lifestyle</span>
            <h2 class="card__title card__title--lg">
              The Most Popular Places to Visit in the World
            </h2>
            <p class="card__sub">Top Places</p>
          </div>
        </article>

        <article class="card card--overlay">
          <div class="card__img-wrap">
            <img
              src="assets/images/fallen-angel.webp"
              alt="Does Exercise Help with your Productivity"
            />
          </div>
          <div class="card__overlay">
            <span class="badge badge--health">Health</span>
            <h2 class="card__title card__title--lg">
              Does Exercise Help with your Productivity
            </h2>
            <p class="card__sub">Health Chat</p>
          </div>
        </article>

        <article class="card card--overlay">
          <div class="card__img-wrap">
            <img
              src="assets/images/zeta-mario.jpg"
              alt="Can Playing Video Games Help Reduce Stress?"
            />
          </div>
          <div class="card__overlay">
            <span class="badge badge--gaming">Gaming</span>
            <h2 class="card__title card__title--lg">
              Can Playing Video Games Help Reduce Stress?
            </h2>
            <p class="card__sub">Game Play</p>
          </div>
        </article>
      </section>

   
  </body>
